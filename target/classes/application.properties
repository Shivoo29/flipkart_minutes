# Flipkart Minutes Application Configuration
spring.application.name=flipkart-minutes

# Disable Spring Boot banner for cleaner demo output
spring.main.banner-mode=off

# Logging - show only our app logs at INFO level
logging.level.root=WARN
logging.level.com.flipkart.minutes=INFO

# Auto-cancel duration in minutes (30 for production, lower for demo)
flipkart.minutes.auto-cancel-minutes=30
